build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInClasses: 20

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 3
  WildcardImport:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
  TopLevelPropertyNaming:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
  SwallowedException:
    active: true

# Privacy red-line: detect accidental key/secret literals.
# These rules are intentionally strict; CI must not allow exceptions.
formatting:
  active: true
  android: true
  autoCorrect: false
  MaximumLineLength:
    active: true
    maxLineLength: 140

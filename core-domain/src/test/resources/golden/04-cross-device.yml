id: 04-cross-device
description: |
  Same physical partner spans two devices: their display name appears as both
  "Jay" (English alias on a translated client) and "小杰" (Chinese alias on the
  default client). This fixture is the head-of-the-class T12 test for cross-
  device speaker alignment — the algorithm must merge both into a single Theirs.
my_aliases:
  - 小明
partner_id: classmate-jay
expected_style_cues:
  - 偶尔自嘲，喜欢用反问
  - 段落清晰，会用"首先""其次"组织信息
  - 较少使用 emoji
metadata:
  cross_device_aliases:
    theirs:
      - Jay
      - 小杰
messages:

id: 01-1on1-baseline
description: |
  Baseline 1:1 chat between Me and a friend over a single afternoon. Establishes
  the simplest case for speaker alignment and style profiling — no nickname
  changes, no group noise, no emoji-heavy patterns.
my_aliases:
  - 小明
partner_id: alex-pal
expected_style_cues:
  - 句末偏好"吧/呀/啊"等语气助词
  - 短句为主，单条多在 5–15 字
  - 使用"哈哈""嗯嗯"作为情绪反馈
messages:
  - { speaker: me,     id: m-01, sent_at: 2025-03-01T14:00:00Z, content: 在吗 }

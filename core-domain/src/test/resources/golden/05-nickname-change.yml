id: 05-nickname-change
description: |
  Me's own visible nickname changes mid-thread (alias swap from "小明" to "M.J.").
  Speaker alignment must not flip Me into Theirs just because the visible label
  changed. Tests T12's reliance on user-supplied alias set rather than literal
  display names.
my_aliases:
  - 小明
  - M.J.
  - 明哥
partner_id: roommate-yan
expected_style_cues:
  - 说话直接，少铺垫
  - 偶尔用方言词（"咋整""得嘞"）
  - 多用问号结尾推动对话

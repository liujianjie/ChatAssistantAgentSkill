id: 03-1on1-long-short-mix
description: |
  1:1 chat with strong asymmetry — Me writes long paragraphs, partner replies in
  one or two characters. Tests that style profiling weights message length
  correctly and does not collapse short acks into noise.
my_aliases:
  - 老王
partner_id: colleague-zhao
expected_style_cues:
  - 长段落表达，信息密度高
  - 倾向给出背景/原因/结论三段式
  - 礼貌但克制，少用语气助词
